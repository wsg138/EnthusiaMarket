kotlin.code.style=official
org.gradle.jvmargs=-Xmx2g -Djavax.net.ssl.trustStore=/opt/data/jdk21-extract/jdk-21.0.6+7/lib/security/cacerts -Djavax.net.ssl.trustStorePassword=changeit
