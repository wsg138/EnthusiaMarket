# EnthusiaMarket — en_US locale.
#
# All values are MiniMessage strings. See https://docs.advntr.dev/minimessage/format.html
# Placeholders use <name> syntax and are populated at call site, e.g. <stall>, <count>.
#
# Bedrock/Cumulus paths render these to legacy §-codes via LegacyComponentSerializer.

prefix: "<dark_gray>[<gold>EnthusiaMarket</gold>]</dark_gray> "

common:
  unknown_player: "Unknown"

admin:
  import:
    result: "<prefix>import: created=<green><created></green> skipped=<yellow><skipped></yellow> provisioned=<green><provisioned></green> <gray>(world=<world>, prefix=<region_prefix>)"
  reload:
    success: "<prefix>config reloaded <gray>(world=<world>, prefix=<region_prefix>)"
    failure: "<prefix><red>reload failed: <reason>"
  list:
    line: "  <aqua><id></aqua> <gray>[<state>]</gray> region=<world>:<region>"
  rg_resync:
    result: "<prefix>WG resync: fixed=<green><fixed></green> skipped=<yellow><skipped></yellow> errors=<red><errors>"
  auction:
    start:
      success: "<prefix><green>Auction created:</green> <id> <gray>for stall</gray> <stall> <gray>starting at</gray> <gold><starting_bid>"
      failure: "<prefix><red>Failed to create auction: <reason>"
      not_found: "<prefix><red>Stall not found"
    cancel:
      success: "<prefix><green>Auction cancelled:</green> <id>"
      failure: "<prefix><red>Failed to cancel auction: <reason>"
      not_found: "<prefix><red>Auction not found"
    startall:
      result: "<prefix><green>mass auction:</green> created=<green><created></green> skipped=<yellow><skipped></yellow> errors=<red><errors></red>"
      failure: "<prefix><red>mass auction failed: <reason>"
  bid:
    success: "<prefix><green>Bid placed:</green> <gold><amount></gold> <gray>on auction</gray> <id>"
    failure: "<prefix><red>Bid rejected: <reason>"
    not_found: "<prefix><red>Auction not found"
  evict:
    success: "<prefix><green>Evicted</green> <aqua><stall></aqua> <green>— reset to unowned and WG cleared."
    not_found: "<prefix><red>Stall not found:</red> <stall>"
    not_owned: "<prefix><yellow>Stall</yellow> <aqua><stall></aqua> <yellow>is not currently owned."

# REQ-250..253 — physical purchase signs. Four lines max per Bukkit sign.
# Render templates are state-driven by PurchaseSignRenderer.
purchase_sign:
  buyable:
    line1: "<dark_gray>[<gold>EM</gold>]"
    line2: "<aqua><stall>"
    line3: "<gold><price>"
    line4: "<green>Click to buy"
  auction:
    line1: "<dark_gray>[<gold>EM</gold>]"
    line2: "<aqua><stall>"
    line3: "<yellow>Bid: <bid>"
    line4: "<gray>/em bid"
  owned:
    line1: "<dark_gray>[<gold>EM</gold>]"
    line2: "<yellow><owner>"
    line3: "<gray>Rent: <time>"
    line4: "<aqua>Right-click"
    overdue: "<red>Overdue"
  missing:
    line1: "<dark_gray>[<gold>EM</gold>]"
    line2: "<red>?<stall>"
  msg:
    created: "<prefix><green>Sign linked to</green> <aqua><stall></aqua> <gray>for</gray> <gold><price>"
    invalid_stall: "<prefix><red>Unknown stall:</red> <stall>"
    invalid_price: "<prefix><red>Sign line 3 must be a positive whole number; got:</red> <price>"
    no_permission: "<prefix><red>You don't have permission to create purchase signs"
    purchased: "<prefix><green>Purchased</green> <aqua><stall></aqua> <gray>for</gray> <gold><price>"
    purchased_guild: "<prefix><green>Purchased</green> <aqua><stall></aqua> <gray>for your guild — you paid</gray> <gold><price>"
    not_in_guild: "<prefix><red>You are not in a guild — cannot buy for guild"
    no_guild_permission: "<prefix><red>You do not have MANAGE_SHOPS in your guild"
    stall_missing: "<prefix><red>Stall not found:</red> <stall>"
    auction_live: "<prefix><yellow>Auction is live on</yellow> <aqua><stall></aqua> <gray>— use /em bid"
    already_owned: "<prefix><gray>This stall is already owned"
    rejected: "<prefix><red>Purchase rejected: <reason>"
    broken: "<prefix><yellow>Purchase sign removed from</yellow> <aqua><stall>"
    confirm_extend: "<prefix><yellow>Right-click again within <seconds>s to extend rent on</yellow> <aqua><stall>"
    extended: "<prefix><green>Rent extended on</green> <aqua><stall></aqua> <gray>(paid <gold><amount><gray>)"
    not_owner: "<prefix><red>You do not own</red> <aqua><stall>"

stall:
