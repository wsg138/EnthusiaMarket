# EnthusiaMarket — en_US locale.
#
# All values are MiniMessage strings. See https://docs.advntr.dev/minimessage/format.html
# Placeholders use <name> syntax and are populated at call site, e.g. <stall>, <count>.
#
# Bedrock/Cumulus paths render these to legacy §-codes via LegacyComponentSerializer.

prefix: "<dark_gray>[<gold>EnthusiaMarket</gold>]</dark_gray> "

common:
  unknown_player: "Unknown"

admin:
  import:
    result: "<prefix>import: created=<green><created></green> skipped=<yellow><skipped></yellow> <gray>(world=<world>, prefix=<region_prefix>)"
  reload:
    success: "<prefix>config reloaded <gray>(world=<world>, prefix=<region_prefix>)"
    failure: "<prefix><red>reload failed: <reason>"
  list:
    line: "  <aqua><id></aqua> <gray>[<state>]</gray> region=<world>:<region>"
  auction:
    start:
      success: "<prefix><green>Auction created:</green> <id> <gray>for stall</gray> <stall> <gray>starting at</gray> <gold><starting_bid>"
      failure: "<prefix><red>Failed to create auction: <reason>"
      not_found: "<prefix><red>Stall not found"
    cancel:
      success: "<prefix><green>Auction cancelled:</green> <id>"
      failure: "<prefix><red>Failed to cancel auction: <reason>"
      not_found: "<prefix><red>Auction not found"
    startall:
      result: "<prefix><green>mass auction:</green> created=<green><created></green> skipped=<yellow><skipped></yellow> errors=<red><errors></red>"
      failure: "<prefix><red>mass auction failed: <reason>"
  bid:
    success: "<prefix><green>Bid placed:</green> <gold><amount></gold> <gray>on auction</gray> <id>"
    failure: "<prefix><red>Bid rejected: <reason>"
    not_found: "<prefix><red>Auction not found"

stall:
  members:
    added: "<prefix><green>Added</green> <player> <gray>as a member of</gray> <aqua><stall>"
    removed: "<prefix><yellow>Removed</yellow> <player> <gray>from</gray> <aqua><stall>"
    list_header: "<prefix><gray>Members of</gray> <aqua><stall></aqua> <gray>(</gray><count><gray>):"
    list_entry: "  <white>- <player>"
    list_empty: "<prefix><gray>No members on</gray> <aqua><stall>"
    not_found: "<prefix><red>Stall not found:</red> <stall>"
    not_authorised: "<prefix><red>You do not have permission to manage</red> <stall>"
    rejected: "<prefix><red>Cannot add member: <reason>"
    unknown_player: "<prefix><red>Unknown player:</red> <player>"

command:
  players_only: "<prefix><red>This command must be run by a player"

shop:
  trade:
    success: "<gray>[<gold>Shop</gold>] <green><message>"
    failure: "<gray>[<gold>Shop</gold>] <red><reason>"
    compensation_failed: "<gray>[<gold>Shop</gold>] <red>Trade failed: <error>"
    compensation_note: "<gray>  Compensation: <compensation>"
  create:
    already_shop: "<red>This sign is already a shop"
    needs_container: "<red>Sign must be attached to a container (chest, barrel, shulker)"
    not_in_stall: "<red>Sign must be inside a registered stall"
    no_authority: "<red>You do not own or rent this stall"
    menu_placeholder: "<yellow>[Shop] Create menu would open here (TDD-52)"
    bedrock_placeholder: "<yellow>[Shop] Bedrock form would open here (TDD-60)"
    guild_unavailable: "<red>LumaGuilds integration is not available"
    success: "<green>Shop created!"
    invalid_input: "<red>Invalid item or price"
  edit:
    not_owner: "<red>You don't own this shop"
    frozen: "<red>Shop frozen"
    unfrozen: "<green>Shop unfrozen"
    updated: "<green>Shop updated"
  protect:
    use_edit_menu: "<yellow>[Shop] Use the edit menu to delete this shop (coming in TDD-57)"
    cannot_break_sign: "<red>You cannot break this shop sign"
    container_has_shops: "<red>This container has active shops. Only the owner can break it."
