name: EnthusiaMarket
version: ${version}
main: net.badgersmc.em.EnthusiaMarket
loader: net.badgersmc.em.EnthusiaMarketPluginLoader
api-version: '1.21'

# Runtime library declarations live in EnthusiaMarketPluginLoader, NOT here.
# That loader points at repo1.maven.org directly, bypassing whatever Maven
# Central mirror the server happens to be configured with (Leaf forks hardcode
# maven.aliyun.com, which has had outages).

dependencies:
  server:
    LumaGuilds:
      load: BEFORE
      required: true
      join-classpath: true
    WorldGuard:
      load: BEFORE
      required: true
      join-classpath: true
    WorldEdit:
      load: BEFORE
      required: false
      join-classpath: true
    FastAsyncWorldEdit:
      load: BEFORE
      required: false
      join-classpath: true
    Vault:
      load: BEFORE
      required: true
      join-classpath: true
    floodgate:
      load: BEFORE
      required: false
      join-classpath: true
    PlaceholderAPI:
      load: BEFORE
      required: false
      join-classpath: true

commands:
  enthusiamarket:
    description: EnthusiaMarket administrative commands
    usage: /enthusiamarket <subcommand>
    aliases: [em]
