name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: "8.10.2"

      # Nexus is now resolved from JitPack — no clone/publish step needed.
      # See build.gradle.kts for the com.github.BadgersMC.Nexus coordinates.

      - name: Build RoseChat (fork) shadowJar
        run: |
          git clone --depth 1 --branch master https://github.com/BadgersMC/Enthusia-RoseChat.git "$RUNNER_TEMP/rosechat"
          cd "$RUNNER_TEMP/rosechat"
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon
          # Drop the RC-2 shadowJar somewhere stable for LumaGuilds to pick up
          ROSE_JAR=$(ls "$RUNNER_TEMP/rosechat/build/libs/"RoseChat-RC-2*.jar | grep -v '\-sources\|-javadoc' | head -1)
          mkdir -p "$RUNNER_TEMP/rosechat-out"
          cp "$ROSE_JAR" "$RUNNER_TEMP/rosechat-out/RoseChat-RC-2.jar"

      - name: Build LumaGuilds shadowJar
        id: lg
        run: |
          git clone --depth 1 https://github.com/BadgersMC/LumaGuilds.git "$RUNNER_TEMP/lumaguilds"
          mkdir -p "$RUNNER_TEMP/lumaguilds/libs"
          cp "$RUNNER_TEMP/rosechat-out/RoseChat-RC-2.jar" "$RUNNER_TEMP/lumaguilds/libs/RoseChat-RC-2.jar"
          cd "$RUNNER_TEMP/lumaguilds"
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon
          JAR=$(ls "$RUNNER_TEMP/lumaguilds/build/libs/"LumaGuilds-*.jar | head -1)
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"

      - name: Test and shadowJar
        env:
          LUMAGUILDS_JAR: ${{ steps.lg.outputs.jar }}
        run: ./gradlew test shadowJar jacocoTestReport --no-daemon

      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: build/reports/jacoco/test/jacocoTestReport.xml
        continue-on-error: true
