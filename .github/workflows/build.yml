name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: "8.10.2"

      # Nexus is now resolved from JitPack — no clone/publish step needed.
      # See build.gradle.kts for the com.github.BadgersMC.Nexus coordinates.

      # ---------------------------------------------------------------------
      # RoseChat <-> LumaGuilds is a circular compile dependency:
      #   - RoseChat master has the LumaGuilds channel hook  (needs LumaGuilds jar)
      #   - LumaGuilds needs the RoseChat jar to compile its chat listeners
      # Both resolve the other via compileOnly files('libs/...') and libs/ is
      # gitignored, so a single clone of either can't compile. We break the cycle
      # with a two-pass bootstrap:
      #   Pass 1: build RoseChat at the last PRE-HOOK commit. That hook-free build
      #           still exposes every API LumaGuilds uses (RoseChatAPI, Channel,
      #           RosePlayer), so it's enough to compile LumaGuilds.
      #   Pass 2: build RoseChat master against the LumaGuilds jar from pass 1.
      #           This validates the hook actually compiles (so we don't silently
      #           ship a hook-less RoseChat — the exact regression that broke
      #           guild/ally chat). EnthusiaMarket itself only needs the
      #           LumaGuilds jar, but pass 2 keeps the full graph honest.
      # If RoseChat history changes, update ROSECHAT_PREHOOK_REF below.
      # ---------------------------------------------------------------------
      - name: Build RoseChat (pre-hook) for LumaGuilds bootstrap
        env:
          ROSECHAT_PREHOOK_REF: 3fe078a   # last RoseChat commit before the LumaGuilds hook
        run: |
          git clone https://github.com/BadgersMC/Enthusia-RoseChat.git "$RUNNER_TEMP/rosechat-prehook"
          cd "$RUNNER_TEMP/rosechat-prehook"
          git checkout "$ROSECHAT_PREHOOK_REF"
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon
          ROSE_JAR=$(ls "$RUNNER_TEMP/rosechat-prehook/build/libs/"RoseChat-RC-2*.jar | grep -v '\-sources\|-javadoc' | head -1)
          mkdir -p "$RUNNER_TEMP/rosechat-out"
          cp "$ROSE_JAR" "$RUNNER_TEMP/rosechat-out/RoseChat-RC-2.jar"

      - name: Build LumaGuilds shadowJar
        id: lg
        run: |
          git clone --depth 1 https://github.com/BadgersMC/LumaGuilds.git "$RUNNER_TEMP/lumaguilds"
          mkdir -p "$RUNNER_TEMP/lumaguilds/libs"
          cp "$RUNNER_TEMP/rosechat-out/RoseChat-RC-2.jar" "$RUNNER_TEMP/lumaguilds/libs/RoseChat-RC-2.jar"
          cd "$RUNNER_TEMP/lumaguilds"
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon
          JAR=$(ls "$RUNNER_TEMP/lumaguilds/build/libs/"LumaGuilds-*.jar | grep -v '\-sources\|-javadoc' | head -1)
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"
          # Stage under the exact name RoseChat's build.gradle expects in libs/
          mkdir -p "$RUNNER_TEMP/lumaguilds-out"
          cp "$JAR" "$RUNNER_TEMP/lumaguilds-out/LumaGuilds-2.1.0.jar"

      - name: Build RoseChat (master, with hook) — validates the cycle closes
        run: |
          git clone --depth 1 --branch master https://github.com/BadgersMC/Enthusia-RoseChat.git "$RUNNER_TEMP/rosechat-master"
          mkdir -p "$RUNNER_TEMP/rosechat-master/libs"
          cp "$RUNNER_TEMP/lumaguilds-out/LumaGuilds-2.1.0.jar" "$RUNNER_TEMP/rosechat-master/libs/LumaGuilds-2.1.0.jar"
          cd "$RUNNER_TEMP/rosechat-master"
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon

      - name: Test and shadowJar
        env:
          LUMAGUILDS_JAR: ${{ steps.lg.outputs.jar }}
        run: ./gradlew test shadowJar jacocoTestReport --no-daemon

      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: build/reports/jacoco/test/jacocoTestReport.xml
        continue-on-error: true

  detekt:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: "8.10.2"
      - name: Run detekt
        run: ./gradlew detekt --no-daemon
      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: build/reports/detekt/

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >
            p/kotlin
            p/java
            p/secrets
            p/sql-injection
        continue-on-error: true

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true
